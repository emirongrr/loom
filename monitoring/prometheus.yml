# Scrape the exporter and load the Loom alert rules. The exporter runs on the
# host, so from inside the Prometheus container the host is host.docker.internal.
global:
  scrape_interval: 5s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: loom
    static_configs:
      - targets:
          - "host.docker.internal:9464"

  # Any metrics the OpenTelemetry Collector re-exposes in Prometheus format.
  - job_name: otel-collector
    static_configs:
      - targets:
          - "otel-collector:8889"
