name: release-artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: read

jobs:
  qualification:
    name: Release qualification
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install privacy SDK dependencies
        run: npm --prefix packages/privacy ci
      - name: Audit dependencies
        run: npm run deps:audit
      - name: Require recent same-commit nightly verification
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NIGHTLY_BRANCH: main
        run: npm run release:nightly:check
      - name: Require complete device evidence
        run: npm run fixtures:release
      - name: Verify release candidate
        run: npm run verify
      - name: Measure production coverage
        run: npm run coverage:check
      - name: Test the release packer
        run: npm run release:packages:test
      - name: Run hermetic SDK to EntryPoint lifecycle
        run: npm run e2e:devnet
      - name: Prove the packed packages clean-room
        run: npm run e2e:clean-room
      - name: Run pinned mainnet token matrix
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
        run: |
          test -n "$MAINNET_RPC_URL"
          npm run test:fork:tokens

  static-analysis:
    name: Release static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Slither
        run: python -m pip install slither-analyzer==0.11.5
      - name: Run Slither
        run: slither . --fail-high

  packages:
    name: Build and verify npm packages
    needs: [qualification, static-analysis]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      # Provenance attestation on a real publish requires an OIDC token; the
      # dry-run below exercises the same path without pushing to the registry.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - name: Install dependencies
        run: npm ci
      - name: Build and pack the publishable packages
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: node tools/release/pack-packages.mjs "$RELEASE_VERSION" dist-release
      - name: Dry-run publish (provenance-ready; no registry push)
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -o pipefail
          # npm refuses to publish a prerelease version to the implicit
          # `latest` dist-tag, so derive the tag from the version: anything
          # with a prerelease suffix goes to `next`.
          case "$RELEASE_VERSION" in
            *-*) DIST_TAG=next ;;
            *) DIST_TAG=latest ;;
          esac
          echo "dist-tag: $DIST_TAG"
          for tarball in dist-release/loom-*.tgz; do
            echo "== $tarball =="
            # --dry-run validates the exact publish the tag would perform. Drop
            # it (and remove this guard) to publish for real once the packages
            # leave pre-audit status; publishConfig already enables provenance.
            npm publish "$tarball" --dry-run --access public --tag "$DIST_TAG"
          done
      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: loom-packages-${{ github.ref_name }}
          path: |
            dist-release/loom-*.tgz
            dist-release/SHA256SUMS
            dist-release/release-manifest.json
          if-no-files-found: error

  publish:
    name: Package and publish release
    needs: [qualification, static-analysis, packages]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Build production artifacts
        run: forge build --skip "test/**" "script/**"
      - name: Download package artifacts
        uses: actions/download-artifact@v6
        with:
          name: loom-packages-${{ github.ref_name }}
          path: dist-release
      - name: Package release evidence
        run: |
          tar -czf "loom-${GITHUB_REF_NAME}.tar.gz" \
            src script docs evidence fixtures out README.md CONTRIBUTING.md SECURITY.md LICENSE \
            foundry.toml package.json package-lock.json .gas-snapshot
          # Checksums use the flat filenames the release assets carry, so a
          # downloader can verify with `sha256sum -c` directly.
          sha256sum "loom-${GITHUB_REF_NAME}.tar.gz" > SHA256SUMS
          (cd dist-release && sha256sum loom-*.tgz) >> SHA256SUMS
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: loom-${{ github.ref_name }}
          path: |
            loom-${{ github.ref_name }}.tar.gz
            SHA256SUMS
          if-no-files-found: error
      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --prerelease \
            --generate-notes \
            --title "$GITHUB_REF_NAME" \
            "loom-${GITHUB_REF_NAME}.tar.gz" \
            SHA256SUMS \
            dist-release/loom-*.tgz \
            dist-release/release-manifest.json
