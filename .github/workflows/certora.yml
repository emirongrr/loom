name: certora

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: certora-${{ github.ref }}
  cancel-in-progress: true

jobs:
  readiness:
    name: Certora readiness gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Validate Certora program
        run: npm run certora:program:check

  compile-only:
    name: Certora compile-only
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        conf:
          - formal/certora/conf/loom-account-authority.conf
          - formal/certora/conf/loom-account-initialization.conf
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Certora CLI
        run: python -m pip install -r formal/certora/requirements.txt
      - name: Install Solidity compiler
        run: |
          python -m pip install solc-select
          solc-select install 0.8.35
          solc-select use 0.8.35
      - name: Compile Certora target
        run: certoraRun ${{ matrix.conf }} --compilation_steps_only --solc "$(command -v solc)"

  prove:
    name: Certora prover
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: authority
            conf: formal/certora/conf/loom-account-authority.conf
          - id: initialization
            conf: formal/certora/conf/loom-account-initialization.conf
    env:
      CERTORAKEY: ${{ secrets.CERTORA_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Prepare prover evidence
        run: |
          mkdir -p artifacts/certora-prover
          if [ -n "$CERTORAKEY" ]; then configured=true; else configured=false; fi
          printf '{\n  "schemaVersion": 1,\n  "repository": "%s",\n  "commit": "%s",\n  "workflowRunId": "%s",\n  "workflowRunAttempt": "%s",\n  "target": "%s",\n  "configuration": "%s",\n  "credentialConfigured": %s\n}\n' \
            "$GITHUB_REPOSITORY" "$GITHUB_SHA" "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" \
            "${{ matrix.id }}" "${{ matrix.conf }}" "$configured" \
            > artifacts/certora-prover/run-metadata.json
          cp formal/certora/requirements.txt artifacts/certora-prover/
          cp -R formal/certora/conf formal/certora/specs artifacts/certora-prover/
      - name: Install Certora CLI
        if: env.CERTORAKEY != ''
        run: set -o pipefail; python -m pip install -r formal/certora/requirements.txt 2>&1 | tee artifacts/certora-prover/install-certora.log
      - name: Install Solidity compiler
        if: env.CERTORAKEY != ''
        run: |
          set -o pipefail
          {
            python -m pip install solc-select
            solc-select install 0.8.35
            solc-select use 0.8.35
          } 2>&1 | tee artifacts/certora-prover/install-solc.log
      - name: Record prover versions
        if: env.CERTORAKEY != ''
        run: |
          certoraRun --version > artifacts/certora-prover/certora-version.txt 2>&1
          solc --version > artifacts/certora-prover/solc-version.txt 2>&1
          python --version > artifacts/certora-prover/python-version.txt 2>&1
      - name: Run Certora
        if: env.CERTORAKEY != ''
        run: set -o pipefail; certoraRun ${{ matrix.conf }} --wait_for_results=all --solc "$(command -v solc)" 2>&1 | tee artifacts/certora-prover/prover.log
      - name: Reject missing prover credential
        if: env.CERTORAKEY == ''
        run: |
          echo "CERTORA_KEY is not configured; no prover result was produced." | tee artifacts/certora-prover/prover.log
          exit 1
      - name: Upload Certora prover evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: certora-prover-${{ matrix.id }}-${{ github.sha }}
          path: artifacts/certora-prover
          retention-days: 30
          if-no-files-found: error
