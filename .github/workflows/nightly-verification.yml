name: nightly-verification

on:
  schedule:
    - cron: "17 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-verification-${{ github.ref }}
  cancel-in-progress: false

jobs:
  foundry-deep:
    name: Deep Foundry fuzz and invariants
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run deep fuzz and invariants
        run: FOUNDRY_PROFILE=deep forge test -vvv

  halmos-full:
    name: Full Halmos symbolic properties
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install Halmos
        run: uv tool install --python 3.12 halmos==0.3.3
      - name: Verify initialization properties
        run: timeout 1200s halmos --contract LoomAccountInitializationFormal --depth 100000 --width 500000
      - name: Verify authority properties
        run: timeout 1200s halmos --contract LoomAccountAuthorityFormal --depth 100000 --width 500000
      - name: Verify execution properties
        run: timeout 1200s halmos --contract LoomAccountExecutionFormal --depth 100000 --width 500000
      - name: Verify recovery properties
        run: timeout 1200s halmos --contract LoomAccountRecoveryFormal --depth 100000 --width 500000
      - name: Verify migration properties
        run: timeout 1200s halmos --contract LoomAccountMigrationFormal --depth 100000 --width 500000

  lean-full:
    name: Lean authority model
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Lean
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain "$(cat formal/lean/lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Build Lean model
        run: cd formal/lean && lake build

  # Future nightly-only candidates:
  # - Slither extended detectors
  # - Aderyn static analysis
  # - Echidna or Medusa stateful campaigns
  # Add these only after the command is pinned and proven non-flaky locally.
