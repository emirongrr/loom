name: nightly-verification

on:
  schedule:
    - cron: "17 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-verification-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mainnet-token-fork:
    name: Pinned mainnet token matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prepare token fork evidence
        run: |
          mkdir -p artifacts/nightly-token-fork
          if [ -n "$MAINNET_RPC_URL" ]; then configured=true; else configured=false; fi
          printf '%s\n' \
            '{' \
            '  "schemaVersion": 1,' \
            '  "repository": "${{ github.repository }}",' \
            '  "commit": "${{ github.sha }}",' \
            '  "workflowRunId": "${{ github.run_id }}",' \
            '  "workflowRunAttempt": "${{ github.run_attempt }}",' \
            '  "forkBlock": 20000000,' \
            "  \"credentialConfigured\": $configured" \
            '}' > artifacts/nightly-token-fork/run-metadata.json
          forge --version > artifacts/nightly-token-fork/forge-version.txt
          node --version > artifacts/nightly-token-fork/node-version.txt
      - name: Require archive RPC
        run: |
          if [ -z "$MAINNET_RPC_URL" ]; then
            echo "MAINNET_RPC_URL is not configured; no token fork result was produced." | tee artifacts/nightly-token-fork/token-matrix.log
            exit 1
          fi
      - name: Run pinned token matrix
        run: |
          set -o pipefail
          npm run test:fork:tokens 2>&1 | tee artifacts/nightly-token-fork/token-matrix.log
      - name: Upload token fork evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-token-fork-${{ github.sha }}
          path: artifacts/nightly-token-fork
          retention-days: 30
          if-no-files-found: error

  foundry-deep:
    name: Deep Foundry fuzz and invariants
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prepare deep Foundry evidence
        run: |
          mkdir -p artifacts/nightly-foundry
          printf '%s\n' \
            '{' \
            '  "schemaVersion": 1,' \
            '  "repository": "${{ github.repository }}",' \
            '  "commit": "${{ github.sha }}",' \
            '  "workflowRunId": "${{ github.run_id }}",' \
            '  "workflowRunAttempt": "${{ github.run_attempt }}",' \
            '  "profile": "deep",' \
            '  "command": "FOUNDRY_PROFILE=deep forge test -vvv"' \
            '}' > artifacts/nightly-foundry/run-metadata.json
          forge --version > artifacts/nightly-foundry/forge-version.txt
          node --version > artifacts/nightly-foundry/node-version.txt
      - name: Run deep fuzz and invariants
        run: |
          set -o pipefail
          FOUNDRY_PROFILE=deep forge test -vvv 2>&1 | tee artifacts/nightly-foundry/forge-test.log
      - name: Upload deep Foundry evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-foundry-${{ github.sha }}
          path: artifacts/nightly-foundry
          retention-days: 30
          if-no-files-found: error

  critical-guard-mutations:
    name: Critical guard mutation score
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run critical guard mutations
        run: |
          mkdir -p artifacts/nightly-mutation
          set -o pipefail
          npm run test:mutation:critical -- --report artifacts/nightly-mutation/report.json 2>&1 | tee artifacts/nightly-mutation/mutation.log
      - name: Upload mutation evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-mutation-${{ github.sha }}
          path: artifacts/nightly-mutation
          retention-days: 30
          if-no-files-found: error

  halmos-full:
    name: Full Halmos symbolic properties
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Halmos
        run: uv tool install --python 3.12 halmos==0.3.3
      - name: Prepare Halmos evidence
        run: |
          mkdir -p artifacts/nightly-halmos
          printf '%s\n' \
            '{' \
            '  "schemaVersion": 1,' \
            '  "repository": "${{ github.repository }}",' \
            '  "commit": "${{ github.sha }}",' \
            '  "workflowRunId": "${{ github.run_id }}",' \
            '  "workflowRunAttempt": "${{ github.run_attempt }}",' \
            '  "depth": 100000,' \
            '  "width": 500000' \
            '}' > artifacts/nightly-halmos/run-metadata.json
          halmos --version > artifacts/nightly-halmos/halmos-version.txt
          forge --version > artifacts/nightly-halmos/forge-version.txt
      - name: Verify initialization properties
        run: set -o pipefail; timeout 1200s halmos --contract LoomAccountInitializationFormal --depth 100000 --width 500000 2>&1 | tee artifacts/nightly-halmos/initialization.log
      - name: Verify authority properties
        run: set -o pipefail; timeout 1200s halmos --contract LoomAccountAuthorityFormal --depth 100000 --width 500000 2>&1 | tee artifacts/nightly-halmos/authority.log
      - name: Verify execution properties
        run: set -o pipefail; timeout 1200s halmos --contract LoomAccountExecutionFormal --depth 100000 --width 500000 2>&1 | tee artifacts/nightly-halmos/execution.log
      - name: Verify recovery properties
        run: set -o pipefail; timeout 1200s halmos --contract LoomAccountRecoveryFormal --depth 100000 --width 500000 2>&1 | tee artifacts/nightly-halmos/recovery.log
      - name: Verify migration properties
        run: set -o pipefail; timeout 1200s halmos --contract LoomAccountMigrationFormal --depth 100000 --width 500000 2>&1 | tee artifacts/nightly-halmos/migration.log
      - name: Upload Halmos evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-halmos-${{ github.sha }}
          path: artifacts/nightly-halmos
          retention-days: 30
          if-no-files-found: error

  lean-full:
    name: Lean authority model
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Lean
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain "$(cat formal/lean/lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Prepare Lean evidence
        run: |
          mkdir -p artifacts/nightly-lean
          printf '%s\n' \
            '{' \
            '  "schemaVersion": 1,' \
            '  "repository": "${{ github.repository }}",' \
            '  "commit": "${{ github.sha }}",' \
            '  "workflowRunId": "${{ github.run_id }}",' \
            '  "workflowRunAttempt": "${{ github.run_attempt }}"' \
            '}' > artifacts/nightly-lean/run-metadata.json
          lean --version > artifacts/nightly-lean/lean-version.txt
          lake --version > artifacts/nightly-lean/lake-version.txt
          cp formal/lean/lean-toolchain formal/lean/lake-manifest.json artifacts/nightly-lean/
      - name: Build Lean model
        run: set -o pipefail; (cd formal/lean && lake build) 2>&1 | tee artifacts/nightly-lean/lake-build.log
      - name: Upload Lean evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-lean-${{ github.sha }}
          path: artifacts/nightly-lean
          retention-days: 30
          if-no-files-found: error

  # Future nightly-only candidates:
  # - Slither extended detectors
  # - Aderyn static analysis
  # - Echidna or Medusa stateful campaigns
  # Add these only after the command is pinned and proven non-flaky locally.
