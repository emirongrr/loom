name: nightly-verification

on:
  schedule:
    - cron: "17 2 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-verification-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mainnet-token-fork:
    name: Pinned mainnet token matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Require archive RPC
        run: test -n "$MAINNET_RPC_URL"
      - name: Run pinned token matrix
        run: |
          mkdir -p artifacts/nightly-token-fork
          set -o pipefail
          npm run test:fork:tokens 2>&1 | tee artifacts/nightly-token-fork/token-matrix.log
      - name: Upload token fork evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-token-fork-${{ github.sha }}
          path: artifacts/nightly-token-fork
          retention-days: 30
          if-no-files-found: error

  foundry-deep:
    name: Deep Foundry fuzz and invariants
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prepare deep Foundry evidence
        run: |
          mkdir -p artifacts/nightly-foundry
          printf '%s\n' \
            '{' \
            '  "schemaVersion": 1,' \
            '  "repository": "${{ github.repository }}",' \
            '  "commit": "${{ github.sha }}",' \
            '  "workflowRunId": "${{ github.run_id }}",' \
            '  "workflowRunAttempt": "${{ github.run_attempt }}",' \
            '  "profile": "deep",' \
            '  "command": "FOUNDRY_PROFILE=deep forge test -vvv"' \
            '}' > artifacts/nightly-foundry/run-metadata.json
          forge --version > artifacts/nightly-foundry/forge-version.txt
          node --version > artifacts/nightly-foundry/node-version.txt
      - name: Run deep fuzz and invariants
        run: |
          set -o pipefail
          FOUNDRY_PROFILE=deep forge test -vvv 2>&1 | tee artifacts/nightly-foundry/forge-test.log
      - name: Upload deep Foundry evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-foundry-${{ github.sha }}
          path: artifacts/nightly-foundry
          retention-days: 30
          if-no-files-found: error

  halmos-full:
    name: Full Halmos symbolic properties
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Halmos
        run: uv tool install --python 3.12 halmos==0.3.3
      - name: Verify initialization properties
        run: timeout 1200s halmos --contract LoomAccountInitializationFormal --depth 100000 --width 500000
      - name: Verify authority properties
        run: timeout 1200s halmos --contract LoomAccountAuthorityFormal --depth 100000 --width 500000
      - name: Verify execution properties
        run: timeout 1200s halmos --contract LoomAccountExecutionFormal --depth 100000 --width 500000
      - name: Verify recovery properties
        run: timeout 1200s halmos --contract LoomAccountRecoveryFormal --depth 100000 --width 500000
      - name: Verify migration properties
        run: timeout 1200s halmos --contract LoomAccountMigrationFormal --depth 100000 --width 500000

  lean-full:
    name: Lean authority model
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Lean
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain "$(cat formal/lean/lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Build Lean model
        run: cd formal/lean && lake build

  # Future nightly-only candidates:
  # - Slither extended detectors
  # - Aderyn static analysis
  # - Echidna or Medusa stateful campaigns
  # Add these only after the command is pinned and proven non-flaky locally.
