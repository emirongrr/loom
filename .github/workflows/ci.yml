name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  foundry:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Audit dependencies
        run: npm run deps:audit
      - name: Validate CI program structure
        run: npm run ci:program:check
      - name: Validate documentation
        run: npm run docs:check
      - name: Validate website
        run: npm run site:check
      - name: Install website dependencies
        run: npm --prefix docs/site ci
      - name: Build website
        run: npm run site:build
      - name: Validate WebAuthn fixtures
        run: npm run fixtures:check
      - name: Validate formal program structure
        run: npm run formal:program:check
      - name: Test privacy SDK boundary
        run: npm run privacy:test
      - name: Check formatting
        run: forge fmt --check
      - name: Lint Solidity
        run: forge lint --deny warnings
      - name: Check production bytecode sizes
        run: forge build --sizes --skip "test/**" "script/**"
      - name: Check gas snapshot
        # MultiP256ValidatorTest is excluded: its measured gas is hypersensitive to
        # unrelated source changes (via-IR/optimizer layout shifts move it by ~45 gas
        # even for a comment-only edit elsewhere), so it is not a stable regression
        # signal. Correctness is still covered by the main test job.
        run: forge snapshot --force --check --tolerance 1 --no-match-contract "LoomAccount(Extended)?InvariantTest|MultiP256ValidatorTest" --no-match-path "test/formal/**"
      - name: Check production coverage gate
        run: npm run coverage:check
      - name: Assert no excluded cryptography
        run: |
          ! grep -RniE 'post.?quantum|quantum|ML.?DSA|SLH.?DSA|\bPQ\b' src test formal fixtures script

  slither:
    name: Static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Slither
        run: python -m pip install slither-analyzer==0.11.5
      - name: Run Slither
        run: slither . --fail-high
