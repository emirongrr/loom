name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: contracts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  foundry:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install privacy SDK dependencies
        run: npm --prefix packages/privacy ci
      - name: Audit dependencies
        run: npm run deps:audit
      - name: Validate CI program structure
        run: npm run ci:program:check
      - name: Validate documentation
        run: npm run docs:check
      - name: Validate website
        run: npm run site:check
      - name: Install website dependencies
        run: npm --prefix docs/site ci
      - name: Build website
        run: npm run site:build
      - name: Validate WebAuthn fixtures
        run: npm run fixtures:check
      - name: Validate formal program structure
        run: npm run formal:program:check
      - name: Test privacy SDK boundary
        run: npm run privacy:test
      - name: Test backend tracker example
        run: npm run example:backend:test
      - name: Test monitoring component
        run: npm run monitoring:test
      - name: Prepare devnet evidence
        run: |
          mkdir -p artifacts/devnet
          printf '%s\n' \
            '{' \
            '  "schemaVersion": 1,' \
            '  "repository": "${{ github.repository }}",' \
            '  "commit": "${{ github.sha }}",' \
            '  "workflowRunId": "${{ github.run_id }}",' \
            '  "workflowRunAttempt": "${{ github.run_attempt }}",' \
            '  "chainId": 31337,' \
            '  "command": "npm run e2e:devnet"' \
            '}' > artifacts/devnet/run-metadata.json
          forge --version > artifacts/devnet/forge-version.txt
          anvil --version > artifacts/devnet/anvil-version.txt
          node --version > artifacts/devnet/node-version.txt
      - name: End-to-end devnet lifecycle
        run: |
          set -o pipefail
          npm run e2e:devnet 2>&1 | tee artifacts/devnet/devnet-lifecycle.log
          cp broadcast/DeployDevnet.s.sol/31337/run-latest.json artifacts/devnet/deployment-broadcast.json
          cp broadcast/DevnetAccountLifecycle.s.sol/31337/run-latest.json artifacts/devnet/account-lifecycle-broadcast.json
      - name: Bundler-in-the-loop devnet
        run: |
          set -o pipefail
          npm run e2e:bundler-devnet 2>&1 | tee artifacts/devnet/bundler-devnet.log
          cp .loom/devnet/alto.log artifacts/devnet/alto.log || true
      - name: Upload devnet evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: devnet-${{ github.sha }}
          path: artifacts/devnet
          retention-days: 30
          if-no-files-found: error
      - name: Clean-room minimal account example
        run: npm run e2e:clean-room
      - name: Check formatting
        run: forge fmt --check
      - name: Lint Solidity
        run: forge lint --deny warnings
      - name: Check production bytecode sizes
        run: forge build --sizes --skip "test/**" "script/**"
      - name: Check generated ABI freshness
        run: npm run abi:check
      - name: Check gas snapshot
        # MultiP256ValidatorTest is excluded: its measured gas is hypersensitive to
        # unrelated source changes (via-IR/optimizer layout shifts move it by ~45 gas
        # even for a comment-only edit elsewhere), so it is not a stable regression
        # signal. WebAuthn evidence tests are fixture-gated and therefore not
        # stable gas-regression targets. Script-policy tests cover deployment
        # configuration behavior, not production runtime gas. Correctness is
        # still covered by the main test job.
        run: forge snapshot --force --check --tolerance 1 --no-match-contract ".*Formal|LoomAccount(Extended)?InvariantTest|MainnetTokenCompatibilityForkTest|MultiP256ValidatorTest|P256VerifierConfigTest|WebAuthnFixtureCorpusTest|WebAuthnEntryPointLifecycleIntegrationTest" --no-match-path "test/(formal|script)/.*"
      - name: Check production coverage gate
        run: npm run coverage:check
      - name: Assert no excluded cryptography
        run: |
          ! grep -RniE 'post.?quantum|quantum|ML.?DSA|SLH.?DSA|\bPQ\b' src test formal fixtures script

  slither:
    name: Static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Slither
        run: python -m pip install slither-analyzer==0.11.5
      - name: Run Slither
        run: slither . --fail-high
