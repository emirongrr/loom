[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
ast = true
remappings = [
    "account-abstraction/=lib/account-abstraction/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "halmos-cheatcodes/=lib/openzeppelin-contracts/lib/halmos-cheatcodes/src/"
]
solc_version = "0.8.35"
optimizer = true
optimizer_runs = 200
via_ir = true
fuzz = { runs = 256 }
invariant = { runs = 128, depth = 32 }

[profile.ci]
fuzz = { runs = 2048 }
invariant = { runs = 256, depth = 50 }

[profile.deep]
fuzz = { runs = 20000 }
invariant = { runs = 2000, depth = 100 }
